apiVersion: apps/v1
kind: Deployment
metadata:
  name: incendies-deployment
  labels:
    app: incendies
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incendies
  template:
    metadata:
      labels:
        app: incendies
    spec:
      containers:
      - name: incendies
        image: thomasroussaux/app-mise-en-prod:latest
        ports:
        - containerPort: 8000
        env:
        - name: MY_BUCKET
          value: "troussaux"
        - name: JETON_API
          valueFrom:
            secretKeyRef:
              name: api-jeton
              key: JETON_API
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: aws-creds
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: aws-creds
              key: AWS_SECRET_ACCESS_KEY
        - name: AWS_SESSION_TOKEN
          valueFrom:
            secretKeyRef:
              name: aws-creds
              key: AWS_SESSION_TOKEN